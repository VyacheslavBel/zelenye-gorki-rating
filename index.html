<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Зелёные горки — рейтинг отрядов</title>
  <meta name="description" content="Рейтинг деятельности отрядов, 2 смена, Зелёные горки." />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="public-page">
    <section class="infographic" data-view="public">
      <header class="hero-header">
        <img class="hero-bg" src="./assets/header-bg.png" alt="" />

        <div class="hero-content">
          <div class="camp-name" data-field="campName">ЗЕЛЁНЫЕ ГОРКИ</div>
          <div class="shift-badge" data-field="shift">2 СМЕНА</div>
          <h1 data-field="title">Рейтинг деятельности отрядов</h1>
        </div>
      </header>

      <div class="status-row">
        <div class="status-pill">
          <span>🍃</span>
          <span data-field="subtitle">Промежуточные результаты</span>
        </div>
      </div>

      <section class="rating-table" aria-label="Рейтинг отрядов">
        <div class="table-head">
          <span>Место</span>
          <span>Отряд</span>
          <span>Вожатые</span>
          <span>Баллы</span>
        </div>

        <div id="rankingList" class="ranking-list"></div>
      </section>

      <section class="criteria-card">
        <h2>🍃 За что начисляются баллы</h2>
        <div id="criteriaList" class="criteria-list"></div>
      </section>

      <footer class="footer-landscape">
        <div class="footer-icons" aria-hidden="true">
          <span>🌲</span>
          <span>🌿</span>
          <span>🌼</span>
          <span>🌲</span>
        </div>

        <p class="updated-sign">
          Обновлено:<br>
          <strong data-field="updated">июнь–июль 2026</strong>
        </p>
      </footer>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
