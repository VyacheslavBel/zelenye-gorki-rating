<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Зелёные горки</title>
  <meta name="description" content="Панель управления рейтингом отрядов лагеря Зелёные горки" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="admin-page">
    <section class="admin-card">
      <div class="admin-topbar">
        <div>
          <p class="eyebrow">Панель управления</p>
          <h1>Admin — рейтинг отрядов</h1>
          <p class="admin-description">Введите значения, нажмите «Сохранить». После этого данные автоматически появятся на <code>index.html</code> в этом же браузере.</p>
        </div>
        <div class="admin-nav">
          <a class="admin-button secondary" href="./index.html">Открыть index</a>
          <button id="resetBtn" type="button" class="admin-button secondary">Сбросить</button>
        </div>
      </div>

      <form id="adminForm" class="admin-form">
        <section class="admin-section">
          <h2>Основная информация</h2>
          <div class="admin-grid two">
            <label>
              Подзаголовок
              <input id="subtitleInput" type="text" />
            </label>
            <label>
              Дата обновления
              <input id="updatedInput" type="text" />
            </label>
          </div>
        </section>

        <section class="admin-section">
          <h2>Рейтинг отрядов</h2>
          <div id="rowsEditor"></div>
        </section>

        <section class="admin-section">
          <h2>Критерии начисления</h2>
          <div id="criteriaEditor"></div>
        </section>

        <div class="admin-actions">
          <button type="submit" class="admin-button">Сохранить</button>
          <button id="downloadBtn" type="button" class="admin-button secondary">Скачать data.json</button>
        </div>
      </form>
    </section>
  </main>

  <script src="./admin.js"></script>
</body>
</html>
